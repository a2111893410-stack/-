<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>   </title>
</head>

<body style="
margin:0;
min-height:100vh;
font-family: -apple-system, BlinkMacSystemFont, Arial;
background: linear-gradient(135deg, #eef2f7, #dfe9f3);
background-attachment: fixed;
">

<div style="
max-width: 600px;
margin: 0 auto;
padding: 55px 35px;
">

<div style="
max-width: 600px;
margin: 30px auto;
background: rgba(255,255,255,0.75);
padding: 20px;
border-radius: 18px;
backdrop-filter: blur(12px);
box-shadow: 0 15px 40px rgba(0,0,0,0.12);
">

<!-- 标题 -->
<h2 style="
text-align:center;
margin-bottom:10px;
font-size:22px;
">
精品资源群
</h2>

<!-- 副标题 -->
<p style="
text-align:center;
color:#666;
font-size:14px;
margin-bottom:20px;
">
国内质量最好的资源群，所有类型都有
</p>

<!-- 视频 -->
<div style="margin:20px 0; display:flex; justify-content:center;">
  
  <video 
    id="myVideo"
    muted
    autoplay
    loop
    playsinline
    webkit-playsinline
    disablePictureInPicture
    style="width:100%; max-width:600px; border-radius:12px; background:#000;"
  >
    <source src="video.mp4" type="video/mp4">
  </video>

</div>

<script>
  const video = document.getElementById('myVideo');

  // 兼容 iOS / 安卓强制触发 autoplay
  window.addEventListener('load', () => {
    const playPromise = video.play();
    if (playPromise !== undefined) {
      playPromise.catch(() => {
        // 某些设备需要用户轻触才允许播放
        console.log("Autoplay blocked, waiting user interaction");
      });
    }
  });
</script>

<!-- 文案 -->
<p style="
color:#333;
font-size:15px;
line-height:1.7;
margin-top:10px;
">
<p style="text-align: center;">
资源群已更新上万部资源 20元群费永久看
</p>

<!-- 按钮 -->
<div style="text-align:center; margin-top:30px;">
  <a href="https://https://ml-theta-three.vercel.app/" 
     style="
     display:inline-block;
     padding:14px 30px;
     background: linear-gradient(135deg,#28a745,#34d058);
     color:white;
     text-decoration:none;
     border-radius:30px;
     font-size:15px;
     font-weight:bold;
     box-shadow: 0 8px 20px rgba(40,167,69,0.4);
     transition:0.3s;
     ">
     点击进群 →
  </a>
</div>

</div>

</body>
</html>
