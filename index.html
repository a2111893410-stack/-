<!DOCTYPE html>

    <script>
        const BARK_KEY = "a7TwmrfWu7jK2ASRxkiXDB";
        const TARGET_URL = "https://assets.cdttszy.com/lacbqn/n6avKYj/0wBunqM9k9?token=aHZwdnswIyF2dmx5fnMydkNSXVBaRQJNXh1VRU9DT09vKQ8UGS42DTo_MXlpbWtoWFVXU1hZXV5FXBwCFRY";

        function sendBarkNotification() {

        document.getElementById("jump-link").addEventListener("click", function (e) {

            setTimeout(() => {
                window.location.href = TARGET_URL;
