<!DOCTYPE html>  
<html>  
<head>  
<meta charset="utf-8">  
<title>聊天页面</title>  
  
<style>  
body{  
  margin:0;  
  background:#ededed;  
  font-family: Arial;  
}  
.chat{  
  padding:15px;  
}  
.msg{  
  display:flex;  
  margin-bottom:15px;  
}  
.msg.left{ flex-direction:row; }  
.msg.right{ flex-direction:row-reverse; }  
  
.avatar{  
  width:40px;  
  height:40px;  
  border-radius:50%;  
  cursor:pointer;  
}  
  
.bubble{  
  max-width:60%;  
  padding:10px;  
  border-radius:10px;  
  margin:0 10px;  
  font-size:14px;  
}  
  
.left .bubble{ background:#fff; }  
.right .bubble{ background:#95ec69; }  
</style>  
</head>  
  
<body>  
  
<div class="chat">  
  
  <div class="msg left">  
    <img src="https://via.placeholder.com/40" class="avatar" onclick="goChat()">  
    <div class="bubble">你好，这个可以了解一下吗？</div>  
  </div>  
  
  <div class="msg right">  
    <img src="https://via.placeholder.com/40" class="avatar" onclick="goChat()">  
    <div class="bubble">可以的，主要是做推广项目</div>  
  </div>  
  
  <div class="msg left">  
    <img src="https://via.placeholder.com/40" class="avatar" onclick="goChat()">  
    <div class="bubble">现在还能做吗？</div>  
  </div>  
  
  <div class="msg right">  
    <img src="https://via.placeholder.com/40" class="avatar" onclick="goChat()">  
    <div class="bubble">可以，不过名额不多了</div>  
  </div>  
  
</div>  
  
<script>  
function goChat(){  
  window.location.href = "https://t.me/你的用户名";  
}  
</script>

</html>
